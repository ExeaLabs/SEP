# Species Extinction Risk Predictor - Default Configuration
# =========================================================

# Project metadata
project:
  name: "species-extinction-predictor"
  version: "0.1.0"
  description: "Multi-modal deep learning for IUCN extinction risk classification"
  seed: 42

# Data configuration
data:
  satellite_dir: "data/satellite_tiles"
  climate_dir: "data/climate"
  labels_file: "data/labels.csv"
  cache_dir: "data/cache"
  batch_size: 32
  num_workers: 4
  pin_memory: true
  test_size: 0.2
  val_size: 0.1
  stratify: true

# IUCN risk categories (target classes)
classes:
  names:
    - "LC"   # Least Concern
    - "NT"   # Near Threatened
    - "VU"   # Vulnerable
    - "EN"   # Endangered
    - "CR"   # Critically Endangered
  num_classes: 5

# Model architecture
model:
  satellite_encoder:
    backbone: "resnet50"
    pretrained: true
    feature_dim: 512
    freeze_bn: false
    dropout: 0.2

  climate_encoder:
    input_dim: 12          # 12 monthly climate variables
    hidden_dim: 256
    num_layers: 2
    dropout: 0.3
    bidirectional: true
    sequence_length: 30    # 30 years of data

  fusion:
    method: "concat"       # Options: concat, attention, bilinear
    hidden_dim: 512
    num_classes: 5
    dropout: 0.3

# Training configuration
training:
  epochs: 100
  optimizer:
    name: "adamw"
    lr: 0.001
    weight_decay: 1.0e-4
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    T_max: 100
    eta_min: 1.0e-6
    warmup_epochs: 5
  loss:
    name: "focal"
    gamma: 2.0
    alpha: [0.1, 0.15, 0.2, 0.25, 0.3]
  early_stopping:
    patience: 15
    min_delta: 0.001
    monitor: "val_macro_f1"
    mode: "max"
  gradient_clipping: 1.0
  mixed_precision: true

# Evaluation metrics
evaluation:
  metrics:
    - "macro_f1"
    - "auc_roc"
    - "per_class_f1"
    - "confusion_matrix"
  primary_metric: "macro_f1"

# Augmentation (albumentations)
augmentation:
  train:
    horizontal_flip: 0.5
    vertical_flip: 0.5
    random_rotate_90: 0.5
    color_jitter:
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.1
    random_resized_crop:
      scale: [0.8, 1.0]
      ratio: [0.9, 1.1]
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]
  val:
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

# Earth Engine configuration
earth_engine:
  project_id: null
  tile_size: 224
  buffer_km: 50
  batch_size: 100
  rate_limit_delay: 0.5    # seconds between requests
  max_retries: 3
  cache_enabled: true

# Logging
logging:
  level: "INFO"
  log_dir: "logs"
  wandb:
    enabled: false
    project: "species-extinction-predictor"
    entity: null

# Checkpointing
checkpointing:
  save_dir: "checkpoints"
  save_best: true
  save_every_n_epochs: 10
